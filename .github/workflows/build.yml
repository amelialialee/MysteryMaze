name: Build MysteryMaze

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Windows
        run: g++ MysteryMaze.cpp -o MysteryMaze.exe
      - uses: actions/upload-artifact@v4
        with:
          name: MysteryMaze-Windows
          path: MysteryMaze.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Mac
        run: g++ MysteryMaze.cpp -o MysteryMaze-mac
      - uses: actions/upload-artifact@v4
        with:
          name: MysteryMaze-Mac
          path: MysteryMaze-mac

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Linux
        run: g++ MysteryMaze.cpp -o MysteryMaze-linux
      - uses: actions/upload-artifact@v4
        with:
          name: MysteryMaze-Linux
          path: MysteryMaze-linux

  release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MysteryMaze-Windows/MysteryMaze.exe
            MysteryMaze-Mac/MysteryMaze-mac
            MysteryMaze-Linux/MysteryMaze-linux